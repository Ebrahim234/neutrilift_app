name: neutrilift
description: "A new Flutter project."

publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: ^3.9.2


dependencies:
  flutter:
    sdk: flutter
  lottie: ^3.3.2
  flutter_svg: ^2.2.1
  flutter_screenutil: ^5.9.3
  circular_countdown_timer: ^0.2.4
  pin_code_fields: ^8.0.1
  google_fonts: ^8.0.1
  dio: ^5.9.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  image_picker: ^1.2.1
  pedometer: ^4.2.0
  permission_handler: ^11.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter



  flutter_lints: ^5.0.0


flutter:


  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
    - assets/lotties/





  fonts:
          - family: k2d
            fonts:
              - asset: assets/fonts/k2d.ttf

